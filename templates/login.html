<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MDW Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-style.css') }}">
</head>
<body>

    <div class="auth-container" id="login-screen">
        <div class="auth-card">
            <div class="auth-brand">
                <i class="fa-solid fa-square-poll-vertical" style="color: var(--db-primary-blue);"></i>
                <div>MDW PANEL</div>
            </div>
            <h2>Sign In to Admin Account</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="email" id="login-email" name="email" placeholder="admin@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="form-error" id="login-error"></div>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <div class="auth-switch">
                Don't have an account? <a href="{{ url_for('signup') }}">Register here</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
