<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MDW Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-style.css') }}">
</head>
<body>

    <div class="auth-container" id="register-screen">
        <div class="auth-card">
            <div class="auth-brand">
                <i class="fa-solid fa-square-poll-vertical" style="color: var(--db-primary-blue);"></i>
                <div>MDW PANEL</div>
            </div>
            <h2>Create Admin Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="register-name" name="full_name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="register-email" name="email" placeholder="admin@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="register-password" name="password" placeholder="••••••••" required minlength="8">
                    </div>
                </div>
                <div class="form-error" id="register-error"></div>
                <button type="submit" class="auth-btn">Register</button>
            </form>
            <div class="auth-switch">
                Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>
